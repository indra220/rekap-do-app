name: Build and Release Electron App

# PENGATURAN: Jalan automatik setiap kali ada push tag 'v*' ke repository
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest 
    permissions:
      contents: write 

    steps:
      - name: 1. Muat turun kod dari Repository
        uses: actions/checkout@v4

      - name: 2. Mempersiapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 3. Sinkronisasi Versi package.json Otomatis dari Git Tag
        shell: bash
        run: |
          # Mengekstrak angka dari tag (contoh: refs/tags/v1.0.45 menjadi 1.0.45)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Mendeteksi rilis versi: $VERSION"
          
          # Memperbarui package.json secara instan di server CI
          npm version $VERSION --no-git-tag-version
          
          echo "Versi package.json berhasil diubah ke $VERSION untuk build ini."

      - name: 4. Memasang Dependencies
        run: npm install

      - name: 5. Build Aplikasi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FULL_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SAFE_MSG=$(echo "$FULL_COMMIT_MSG" | python3 -c "import sys, json; text = sys.stdin.read().strip(); print(json.dumps(text).strip('\"'))")

          cat <<EOF > update-config.json
          {
            "releaseInfo": {
              "releaseNotes": "$SAFE_MSG"
            }
          }
          EOF

          echo "Fail update-config.json berjaya dibuat:"
          cat update-config.json

          # Paksa electron-builder untuk TIDAK membuat rilis di GitHub secara mandiri, 
          # tetapi tetap mengizinkannya membuat file latest.yml
          npm run dist -- -p never

      - name: 6. Mengunggah file Installer dan latest.yml ke GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          append_body: true
          prerelease: false 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}